services:
  - type: web
    name: pythonbackend-dev
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./pythonbackend.db"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
